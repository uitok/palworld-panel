name: Windows package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build
        required: true
        default: v1.0.3-hotfix.1

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0
      - name: Validate release tag
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$') {
            throw "invalid release tag: $env:RELEASE_TAG"
          }
          if ((git describe --tags --exact-match).Trim() -ne $env:RELEASE_TAG) {
            throw "checkout is not the requested release tag"
          }
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum
            sav-cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
      - name: Build Windows package
        shell: pwsh
        run: |
          $gcc = Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin\gcc.exe"
          if (-not (Test-Path $gcc)) { throw "MinGW gcc not found: $gcc" }
          ./scripts/package.ps1 -Version $env:RELEASE_TAG -SkipTests -Clean -MingwGcc $gcc
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
      - name: Verify package and Launcher
        shell: pwsh
        run: |
          $archive = "dist\packages\palpanel_$($env:RELEASE_TAG)_windows_amd64.zip"
          $package = "dist\packages\palpanel_$($env:RELEASE_TAG)_windows_amd64"
          $objdump = Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin\objdump.exe"
          ./scripts/verify-windows-package.ps1 -Archive $archive -ObjdumpPath $objdump
          ./scripts/smoke-windows.ps1 -PackageDir $package -Version $env:RELEASE_TAG
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: palpanel-windows-${{ inputs.release_tag }}
          if-no-files-found: error
          retention-days: 1
          path: dist/packages/palpanel_${{ inputs.release_tag }}_windows_amd64.zip
