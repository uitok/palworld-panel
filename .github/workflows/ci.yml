name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CI_PACKAGE_VERSION: v0.0.0-ci

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum
            sav-cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install shellcheck and gitleaks
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          GOBIN="$RUNNER_TEMP/bin" go install github.com/zricethezav/gitleaks/v8@v8.27.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Go tests
        run: |
          (cd backend && go test -p=1 ./...)
          (cd sav-cli && CGO_ENABLED=1 go test -p=1 ./...)
          (cd backend && go test -p=1 -race ./...)
          scripts/check-go-coverage.sh
      - name: Frontend checks
        run: |
          cd frontend
          npm ci
          npm run check
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Source and shell checks
        run: |
          shellcheck install.sh scripts/package.sh scripts/palpanelctl scripts/start.sh scripts/scan-secrets.sh scripts/verify-release-contents.sh scripts/smoke-linux.sh scripts/test-install.sh scripts/test-bootstrap-install.sh scripts/test-upgrade.sh scripts/check-go-coverage.sh
          scripts/scan-secrets.sh
          gitleaks dir . --config .gitleaks.toml --redact --no-banner
          git diff --check
      - name: Verify systemd units
        run: |
          tmp="$(mktemp -d)"
          sed 's|ExecStart=/opt/palpanel/current/bin/palpanel.*|ExecStart=/bin/true|' scripts/systemd/palpanel.service > "$tmp/palpanel.service"
          sed 's|ExecStart=/opt/palpanel/current/bin/sav-cli.*|ExecStart=/bin/true|' scripts/systemd/palpanel-sav-cli.service > "$tmp/palpanel-sav-cli.service"
          sed 's|ExecStart=/opt/palpanel/current/bin/palcalc-bridge.*|ExecStart=/bin/true|' scripts/systemd/palpanel-palcalc.service > "$tmp/palpanel-palcalc.service"
          systemd-analyze verify "$tmp/palpanel.service" "$tmp/palpanel-sav-cli.service" "$tmp/palpanel-palcalc.service"
      - name: Build and smoke Linux package
        run: |
          scripts/package.sh --version "$CI_PACKAGE_VERSION" --targets linux-amd64 --skip-tests --clean
          scripts/verify-release-contents.sh \
            "dist/packages/palpanel_${CI_PACKAGE_VERSION}_linux_amd64.tar.gz" \
            "dist/packages/palpanel-sav-cli_${CI_PACKAGE_VERSION}_source.tar.gz" \
            "dist/packages/palpanel_${CI_PACKAGE_VERSION}_source.tar.gz"
          scripts/smoke-linux.sh "dist/packages/palpanel_${CI_PACKAGE_VERSION}_linux_amd64.tar.gz"
          sudo scripts/test-install.sh "dist/packages/palpanel_${CI_PACKAGE_VERSION}_linux_amd64.tar.gz"
          sudo scripts/test-bootstrap-install.sh "dist/packages/palpanel_${CI_PACKAGE_VERSION}_linux_amd64.tar.gz"
          sudo scripts/test-upgrade.sh "dist/packages/palpanel_${CI_PACKAGE_VERSION}_linux_amd64.tar.gz" v1.0.2

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum
            sav-cli/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
      - name: Native tests and build
        shell: pwsh
        run: |
          $gcc = Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin\gcc.exe"
          if (-not (Test-Path $gcc)) { throw "MinGW gcc not found: $gcc" }
          $runtimeRoot = Join-Path $env:GITHUB_WORKSPACE "dev-runtime\windows"
          ./scripts/package.ps1 -Version $env:CI_PACKAGE_VERSION -Clean -MingwGcc $gcc -RuntimeRoot $runtimeRoot
      - name: Windows upgrade, uninstall, and recovery contract
        shell: pwsh
        run: |
          $runtimeRoot = Join-Path $env:GITHUB_WORKSPACE "dev-runtime\windows"
          ./scripts/test-windows-upgrade.ps1 -RuntimeRoot $runtimeRoot
      - name: Offline Windows E2E validation
        shell: pwsh
        run: |
          $env:PALPANEL_OBJDUMP_PATH = Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin\objdump.exe"
          $runtimeRoot = Join-Path $env:GITHUB_WORKSPACE "dev-runtime\windows"
          ./scripts/e2e-windows.ps1 `
            -RuntimeRoot $runtimeRoot `
            -SkipGameDownload `
            -SkipLiveServer `
            -SkipPalDefender `
            -TimeoutMinutes 30
      - name: Upload Windows validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: palpanel-windows-validation-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            dev-runtime/windows/artifacts/**
            dev-runtime/windows/e2e/**
            dev-runtime/windows/temp/**
      - name: Upload Windows CI package
        uses: actions/upload-artifact@v4
        with:
          name: palpanel-windows-amd64-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: dev-runtime/windows/package/palpanel_${{ env.CI_PACKAGE_VERSION }}_windows_amd64.zip

  vulnerability:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Dependency vulnerability checks
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@latest
          (cd backend && "$RUNNER_TEMP/bin/govulncheck" ./...)
          (cd sav-cli && "$RUNNER_TEMP/bin/govulncheck" ./...)
          cd frontend
          npm audit --audit-level=high
