openapi: 3.1.0
info:
  title: PalPanel API
  version: 1.0.0
  description: Stable HTTP contract for the PalPanel 1.x management API.
servers:
  - url: /api
security:
  - sessionCookie: []
  - developmentKey: []
tags:
  - {name: auth}
  - {name: system}
  - {name: server}
  - {name: content}
  - {name: security}
  - {name: world}
x-success: &success
  description: Successful response wrapped in an API envelope.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SuccessEnvelope'}
x-accepted: &accepted
  description: Asynchronous job accepted.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/JobEnvelope'}
x-error: &error
  description: Request failed.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ErrorEnvelope'}
x-auth-status: &authStatus
  description: Authentication initialization and current session state.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/AuthStatusEnvelope'}
x-session: &session
  description: Authenticated account and permissions.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SessionEnvelope'}
x-development-key: &developmentKey
  description: Development key metadata. The complete token is returned only when created.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/DevelopmentKeyEnvelope'}
x-development-keys: &developmentKeys
  description: Development keys owned by the authenticated account.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/DevelopmentKeyListEnvelope'}
x-import-inspection: &importInspection
  description: Validated Mod source and candidate metadata.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ImportInspectionEnvelope'}
x-save-import-inspection: &saveImportInspection
  description: Inspected save-world candidates. Private extraction paths are never returned.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SaveImportInspectionEnvelope'}
x-save-import-conflict: &saveImportConflict
  description: Save import conflict. Multi-world direct uploads include a resumable inspection ID and candidates.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SaveImportConflictEnvelope'}
x-save-migration-players: &saveMigrationPlayers
  description: Players available in the selected old save source.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SaveMigrationPlayersEnvelope'}
x-save-migration-preview: &saveMigrationPreview
  description: Calculated target PlayerUID values and blocking migration conflicts.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SaveMigrationPreviewEnvelope'}
x-local-mod-scan: &localModScan
  description: Reconciliation of Mod files, database records, persistent ignore state, and safe action capabilities.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/LocalScanEnvelope'}
x-local-mod-action: &localModAction
  description: Result of a revision-checked local Mod action followed by a fresh scan.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/LocalModActionEnvelope'}
x-ai-translation-config: &aiTranslationConfig
  description: Public AI translation settings. Secret values are never returned.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/AITranslationConfigEnvelope'}
x-ai-translation-test: &aiTranslationTest
  description: AI provider connection test result without secret values.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/AITranslationTestEnvelope'}
x-network-proxy-config: &networkProxyConfig
  description: Public download/server-update and community-server proxy settings. The download scope includes SteamCMD, Workshop, GitHub/HTTPS mods, PalDefender, and UE4SS. Credentials are never returned.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/NetworkProxyConfigEnvelope'}
x-network-proxy-test: &networkProxyTest
  description: Bounded connectivity test for one saved proxy scope.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/NetworkProxyTestEnvelope'}
x-community-server-result: &communityServerResult
  description: Filtered page of discoverable Palworld community servers, possibly served from stale cache.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/CommunityServerResultEnvelope'}
x-community-server-status: &communityServerStatus
  description: Upstream reachability, proxy, cache freshness, and persistent-cache state.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/CommunityServerSourceStatusEnvelope'}
x-breeding-status: &breedingStatus
  description: PalCalc sidecar availability and bounded diagnostic status.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/BreedingStatusEnvelope'}
x-astrbot-server-status: &astrBotServerStatus
  description: Minimal server and online-player status for signed AstrBot commands.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/AstrBotServerStatusEnvelope'}
x-save-index-status: &saveIndexStatus
  description: Save index state, parser capability, and bounded diagnostics.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/SaveIndexStatusEnvelope'}
x-player-list: &playerList
  description: Deduplicated players merged from save index, official REST, and PalDefender.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/PlayerListEnvelope'}
x-player-detail: &playerDetail
  description: One deduplicated player with save and online metadata.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/PlayerDetailEnvelope'}
x-player-inventory: &playerInventory
  description: Player inventory containers from the selected save view.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/PlayerInventoryEnvelope'}
x-mod-config-adapters: &modConfigAdapters
  description: Registered typed Mod configuration adapters and their opaque files.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ModConfigurationAdapterListEnvelope'}
x-mod-config-files: &modConfigFiles
  description: Editable configuration files identified by opaque IDs.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ModConfigFileListEnvelope'}
x-mod-config-document: &modConfigDocument
  description: Revisioned UTF-8 configuration document.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ModConfigDocumentEnvelope'}
x-mod-config-backups: &modConfigBackups
  description: Backup timeline for a configuration file.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/ModConfigBackupListEnvelope'}
x-monitor-snapshot: &monitorSnapshot
  description: Host and workload resource sample with lifecycle diagnostics and derived risks.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/MonitorSnapshotEnvelope'}
x-monitor-history: &monitorHistory
  description: Chronological monitor samples with separate host and workload memory.
  content:
    application/json:
      schema: {$ref: '#/components/schemas/MonitorHistoryEnvelope'}
x-read-responses: &readResponses
  '200': *success
  '401': *error
  '404': *error
x-write-responses: &writeResponses
  '200': *success
  '201': *success
  '202': *accepted
  '400': *error
  '401': *error
  '403': *error
  '409': *error
  '422': *error
  '500': *error
x-id-parameter: &idParameter
  name: id
  in: path
  required: true
  schema: {type: string}
x-player-source-parameter: &playerSourceParameter
  name: source
  in: query
  required: false
  schema: {type: string, enum: [server]}
x-idempotency-key: &idempotencyKey
  name: Idempotency-Key
  in: header
  required: true
  description: Unique key for one GM write intent. Reusing it with the same payload replays the result; a different payload returns HTTP 409.
  schema: {type: string, minLength: 8, maxLength: 128, pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{7,127}$'}
x-name-parameter: &nameParameter
  name: name
  in: path
  required: true
  schema: {type: string}
x-json-request: &jsonRequest
  required: true
  content:
    application/json:
      schema: {$ref: '#/components/schemas/JsonObject'}
paths:
  /community-servers:
    get:
      operationId: listCommunityServers
      tags: [server]
      x-palpanel-permission: read
      parameters: &communityServerQueryParameters
        - {name: region, in: query, schema: {type: string, enum: [cn, global], default: cn}}
        - {name: search, in: query, schema: {type: string, maxLength: 128}}
        - {name: min_players, in: query, schema: {type: integer, minimum: 0, default: 0}}
        - {name: max_players, in: query, schema: {type: integer, minimum: 0, default: 0}}
        - {name: password, in: query, schema: {type: boolean}}
        - {name: version, in: query, schema: {type: string, maxLength: 64}}
        - {name: status, in: query, schema: {type: string, enum: [online, offline, all], default: online}}
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 30}}
      responses: {'200': *communityServerResult, '400': *error, '401': *error, '429': *error, '502': *error, '503': *error}
  /community-servers/source-status:
    get: {operationId: getCommunityServerSourceStatus, tags: [server], x-palpanel-permission: read, responses: {'200': *communityServerStatus, '401': *error}}
  /community-servers/refresh:
    post:
      operationId: refreshCommunityServers
      tags: [server]
      x-palpanel-permission: read
      parameters: *communityServerQueryParameters
      responses: {'200': *communityServerResult, '400': *error, '401': *error, '403': *error, '429': *error, '502': *error, '503': *error}
  /health:
    get: {operationId: getHealth, tags: [system], security: [], x-palpanel-permission: public, responses: {'200': *success}}
  /ready:
    get: {operationId: getReadiness, tags: [system], security: [], x-palpanel-permission: public, responses: {'200': *success, '503': *error}}
  /auth/status:
    get:
      operationId: getAuthenticationStatus
      tags: [auth]
      security: []
      x-palpanel-permission: public
      responses: {'200': *authStatus, '500': *error}
  /auth/register:
    post:
      operationId: registerInitialAdministrator
      tags: [auth]
      security: []
      x-palpanel-permission: public
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthCredentials'}
      responses: {'201': *session, '400': *error, '409': *error, '422': *error, '429': *error, '500': *error}
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      x-palpanel-permission: public
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthCredentials'}
      responses: {'200': *session, '400': *error, '401': *error, '429': *error, '500': *error}
  /auth/me:
    get: {operationId: getCurrentPrincipal, tags: [auth], x-palpanel-permission: read, responses: {'200': *session, '401': *error}}
  /auth/logout:
    post: {operationId: logout, tags: [auth], x-palpanel-permission: read, responses: *writeResponses}
  /auth/password:
    put:
      operationId: changeOwnPassword
      tags: [auth]
      security: [{sessionCookie: []}]
      x-palpanel-permission: session
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PasswordChangeRequest'}
      responses: {'200': *success, '400': *error, '401': *error, '403': *error, '422': *error, '429': *error, '500': *error}
  /auth/api-keys:
    get: {operationId: listDevelopmentKeys, tags: [auth], x-palpanel-permission: read, responses: {'200': *developmentKeys, '401': *error, '500': *error}}
    post:
      operationId: createDevelopmentKey
      tags: [auth]
      x-palpanel-permission: 'security:write'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DevelopmentKeyInput'}
      responses: {'201': *developmentKey, '400': *error, '401': *error, '403': *error, '422': *error, '500': *error}
  /auth/api-keys/{id}:
    parameters: [*idParameter]
    delete: {operationId: revokeDevelopmentKey, tags: [auth], x-palpanel-permission: 'security:write', responses: *writeResponses}
  /jobs:
    get: {operationId: listJobs, tags: [system], x-palpanel-permission: read, responses: *readResponses}
  /jobs/{id}:
    parameters: [*idParameter]
    get: {operationId: getJob, tags: [system], x-palpanel-permission: read, responses: *readResponses}
  /audit-logs:
    get: {operationId: listAuditLogs, tags: [system], x-palpanel-permission: 'audit:read', responses: *readResponses}
  /system/debug:
    get: {operationId: getDebugLogging, tags: [system], x-palpanel-permission: read, responses: *readResponses}
    put: {operationId: updateDebugLogging, tags: [system], x-palpanel-permission: 'config:write', requestBody: *jsonRequest, responses: *writeResponses}
  /settings/network-proxy:
    get: {operationId: getNetworkProxyConfig, tags: [system], x-palpanel-permission: read, responses: {'200': *networkProxyConfig, '401': *error, '500': *error}}
    put:
      operationId: updateNetworkProxyConfig
      tags: [system]
      x-palpanel-permission: 'config:write'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/NetworkProxyConfigUpdate'}
      responses: {'200': *networkProxyConfig, '400': *error, '401': *error, '403': *error, '500': *error}
  /settings/network-proxy/test:
    post:
      operationId: testNetworkProxy
      tags: [system]
      x-palpanel-permission: 'config:write'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/NetworkProxyTestRequest'}
      responses: {'200': *networkProxyTest, '400': *error, '401': *error, '403': *error, '502': *error}
  /alerts:
    get: {operationId: listAlerts, tags: [system], x-palpanel-permission: read, responses: *readResponses}
  /alerts/{id}/ack:
    parameters: [*idParameter]
    post: {operationId: acknowledgeAlert, tags: [system], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /schedules:
    get: {operationId: listSchedules, tags: [system], x-palpanel-permission: read, responses: *readResponses}
    post:
      operationId: createSchedule
      tags: [system]
      x-palpanel-permission: 'server:control'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScheduleInput'}
      responses: *writeResponses
  /schedules/{id}:
    parameters: [*idParameter]
    put:
      operationId: updateSchedule
      tags: [system]
      x-palpanel-permission: 'server:control'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScheduleInput'}
      responses: *writeResponses
    delete: {operationId: deleteSchedule, tags: [system], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /schedules/{id}/run:
    parameters: [*idParameter]
    post: {operationId: runSchedule, tags: [system], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/status:
    get: {operationId: getServerStatus, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/prerequisites:
    get: {operationId: getServerPrerequisites, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/host:
    get: {operationId: getHostCapabilities, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/runtime:
    get: {operationId: getRuntime, tags: [server], x-palpanel-permission: read, responses: *readResponses}
    put: {operationId: updateRuntime, tags: [server], x-palpanel-permission: 'config:write', requestBody: *jsonRequest, responses: *writeResponses}
  /server/import:
    post: {operationId: importServerDirectory, tags: [server], x-palpanel-permission: 'config:write', requestBody: *jsonRequest, responses: *writeResponses}
  /server/docker/plan:
    get: {operationId: getDockerInstallPlan, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/docker/install:
    post: {operationId: installDocker, tags: [server], x-palpanel-permission: 'server:control', requestBody: *jsonRequest, responses: *writeResponses}
  /server/docker/mirrors/plan:
    get: {operationId: getDockerMirrorPlan, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/docker/mirrors/configure:
    post: {operationId: configureDockerMirrors, tags: [server], x-palpanel-permission: 'server:control', requestBody: *jsonRequest, responses: *writeResponses}
  /server/bootstrap:
    post: {operationId: bootstrapServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/logs:
    get:
      operationId: getServerLogs
      tags: [server]
      x-palpanel-permission: read
      parameters:
        - {name: channel, in: query, required: false, schema: {type: string, enum: [game, launcher, paldefender-rest]}}
        - {name: tail, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 5000, default: 200}}
        - {name: search, in: query, required: false, schema: {type: string}}
        - {name: level, in: query, required: false, schema: {type: string}}
        - {name: since, in: query, required: false, schema: {type: string}}
      responses: *readResponses
  /server/world:
    get: {operationId: getWorld, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/world/reset:
    post: {operationId: resetWorld, tags: [server], x-palpanel-permission: 'world:reset', requestBody: *jsonRequest, responses: *writeResponses}
  /server/install:
    post: {operationId: installServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/update:
    post: {operationId: updateServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/update-if-needed:
    post: {operationId: updateServerIfNeeded, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/version:
    get: {operationId: getServerVersion, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/version/check:
    post: {operationId: checkServerVersion, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/start:
    post: {operationId: startServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/stop:
    post: {operationId: stopServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/restart:
    post: {operationId: restartServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/safe-restart:
    post:
      operationId: safeRestartServer
      tags: [server]
      x-palpanel-permission: 'server:control'
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SafeLifecycleRequest'}}}}
      responses: *writeResponses
  /server/safe-stop:
    post:
      operationId: safeStopServer
      tags: [server]
      x-palpanel-permission: 'server:control'
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SafeLifecycleRequest'}}}}
      responses: *writeResponses
  /server/force-stop:
    post: {operationId: forceStopServer, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/startup:
    get: {operationId: getServerStartup, tags: [server], x-palpanel-permission: read, responses: *readResponses}
    put: {operationId: updateServerStartup, tags: [server], x-palpanel-permission: 'config:write', requestBody: *jsonRequest, responses: *writeResponses}
  /server/initialize-config:
    post: {operationId: initializeServerConfig, tags: [server], x-palpanel-permission: 'config:write', responses: *writeResponses}
  /monitor/snapshot:
    get: {operationId: getMonitorSnapshot, tags: [server], x-palpanel-permission: read, responses: {'200': *monitorSnapshot, '401': *error, '500': *error}}
  /monitor/history:
    get: {operationId: getMonitorHistory, tags: [server], x-palpanel-permission: read, responses: {'200': *monitorHistory, '401': *error, '500': *error}}
  /server/backup:
    post: {operationId: createBackup, tags: [server], x-palpanel-permission: 'backup:write', responses: *writeResponses}
  /backups:
    get: {operationId: listBackups, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /backups/webdav/config:
    get: {operationId: getBackupWebDAVConfig, tags: [server], x-palpanel-permission: 'backup:write', responses: *readResponses}
    put:
      operationId: updateBackupWebDAVConfig
      tags: [server]
      x-palpanel-permission: 'backup:write'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WebDAVConfigUpdate'}
      responses: *writeResponses
  /backups/webdav/test:
    post:
      operationId: testBackupWebDAVConfig
      tags: [server]
      x-palpanel-permission: 'backup:write'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WebDAVConfigUpdate'}
      responses: *writeResponses
  /backups/{name}/restore:
    parameters: [*nameParameter]
    post: {operationId: restoreBackup, tags: [server], x-palpanel-permission: 'backup:write', responses: *writeResponses}
  /backups/{name}/download:
    parameters: [*nameParameter]
    get: {operationId: downloadBackup, tags: [server], x-palpanel-permission: 'backup:write', responses: *readResponses}
  /backups/{name}:
    parameters: [*nameParameter]
    delete: {operationId: deleteBackup, tags: [server], x-palpanel-permission: 'backup:write', responses: *writeResponses}
  /backups/{name}/verify:
    parameters: [*nameParameter]
    post: {operationId: verifyBackup, tags: [server], x-palpanel-permission: 'backup:write', responses: *writeResponses}
  /backups/{name}/upload-webdav:
    parameters: [*nameParameter]
    post: {operationId: uploadBackupToWebDAV, tags: [server], x-palpanel-permission: 'backup:write', responses: *writeResponses}
  /server/info:
    get: {operationId: getPalworldInfo, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/players:
    get: {operationId: getOnlinePlayers, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/settings:
    get: {operationId: getLiveServerSettings, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/metrics:
    get: {operationId: getServerMetrics, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/game-data:
    get: {operationId: getServerGameData, tags: [server], x-palpanel-permission: read, responses: *readResponses}
  /server/announce:
    post: {operationId: announce, tags: [server], x-palpanel-permission: 'server:control', requestBody: *jsonRequest, responses: *writeResponses}
  /server/save:
    post: {operationId: saveWorld, tags: [server], x-palpanel-permission: 'server:control', responses: *writeResponses}
  /server/shutdown:
    post: {operationId: shutdownServer, tags: [server], x-palpanel-permission: 'server:control', requestBody: *jsonRequest, responses: *writeResponses}
  /config/palworld:
    get:
      operationId: getPalworldConfig
      tags: [content]
      x-palpanel-permission: 'config:write'
      responses: {'200': {description: Palworld config, content: {application/json: {schema: {$ref: '#/components/schemas/PalworldConfigEnvelope'}}}}, '401': *error, '403': *error, '500': *error}
    put:
      operationId: updatePalworldConfig
      tags: [content]
      x-palpanel-permission: 'config:write'
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PalworldConfigUpdateRequest'}}}}
      responses: {'200': {description: Draft created, content: {application/json: {schema: {$ref: '#/components/schemas/PalworldConfigEnvelope'}}}}, '400': *error, '401': *error, '403': *error, '500': *error}
  /config/palworld/apply:
    post:
      operationId: applyPalworldConfig
      tags: [content]
      x-palpanel-permission: 'config:write + server:control'
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PalworldConfigApplyRequest'}}}}
      responses: {'202': *accepted, '400': *error, '401': *error, '403': *error, '409': *error, '410': *error, '500': *error}
  /config/palworld/schema:
    get:
      operationId: getPalworldConfigSchema
      tags: [content]
      x-palpanel-permission: 'config:write'
      responses: {'200': {description: Palworld config schema, content: {application/json: {schema: {$ref: '#/components/schemas/PalworldConfigSchemaEnvelope'}}}}, '401': *error, '403': *error, '500': *error}
  /config/palworld/validate:
    post:
      operationId: validatePalworldConfig
      tags: [content]
      x-palpanel-permission: 'config:write'
