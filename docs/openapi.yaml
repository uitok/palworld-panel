components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: palpanel_session
      description: HttpOnly SameSite=Lax session cookie created by registration or login.
    developmentKey:
      type: http
      scheme: bearer
      bearerFormat: ppk_...
      description: 'Revocable development key supplied as Authorization: Bearer ppk_...'
  schemas:
    SaveIndexCounts:
      type: object
      required: [players, guilds, bases, pals, containers, map_entities]
      properties:
        players: {type: integer, minimum: 0}
        guilds: {type: integer, minimum: 0}
        bases: {type: integer, minimum: 0}
        pals: {type: integer, minimum: 0}
        containers: {type: integer, minimum: 0}
        map_entities: {type: integer, minimum: 0}
    SaveIndexStatus:
      type: object
      required: [enabled, state, stale, source_path, updated_at, duration_ms, warnings, counts]
      properties:
        enabled: {type: boolean}
        state: {type: string, enum: [disabled, missing, not_indexed, ready, stale, error]}
        stale: {type: boolean}
        source_path: {type: string}
        updated_at: {type: string}
        duration_ms: {type: integer, minimum: 0}
        error: {type: string}
        error_code: {type: string}
        error_detail: {type: string, maxLength: 513}
        oodle_available: {type: boolean}
        warnings: {type: array, items: {type: string}}
        counts: {$ref: '#/components/schemas/SaveIndexCounts'}
        parser: {type: string}
        cache_path: {type: string}
    Player:
      type: object
      required: [id, player_uid, steam_id, nickname, level, guild_id, guild_name, is_online, online_source, online_stale, last_online_time, location_x, location_y, location_z]
      properties:
        id: {type: string}
        player_uid: {type: string}
        steam_id: {type: string}
        nickname: {type: string}
        level: {type: integer, minimum: 0}
        guild_id: {type: string}
        guild_name: {type: string}
        is_online: {type: boolean}
        online_source: {type: string, enum: [none, rest, paldefender, rest+paldefender]}
        online_stale: {type: boolean}
        gm_user_id: {type: string}
        last_online_time: {type: string}
        location_x: {type: number}
        location_y: {type: number}
        location_z: {type: number}
        inventory_summary: {type: object, additionalProperties: true}
        ping: {type: number}
        ip: {type: string}
    PlayerDataView:
      type: object
      required: [scope, source_id, source_kind, source_name, online_overlay]
      properties:
        scope: {type: string, enum: [active, server]}
        source_id: {type: string}
        source_kind: {type: string, enum: [server, import]}
        source_name: {type: string}
        online_overlay: {type: boolean}
    SaveInventorySlot:
      type: object
      required: [slot, item_id, item_name, count, durability]
      properties:
        slot: {type: integer, minimum: 0}
        item_id: {type: string}
        item_name: {type: string}
        count: {type: integer, minimum: 0}
        durability: {anyOf: [{type: number}, {type: 'null'}]}
    SaveInventoryContainer:
      type: object
      required: [container_id, owner_type, owner_id, slots]
      properties:
        container_id: {type: string}
        owner_type: {type: string}
        owner_id: {type: string}
        slots: {type: array, items: {$ref: '#/components/schemas/SaveInventorySlot'}}
    ListSummary:
      type: object
      required: [total, limit, offset, returned, page]
      properties:
        total: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 0}
        offset: {type: integer, minimum: 0}
        returned: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
    PlayerListResult:
      type: object
      required: [players, status, summary, view]
      properties:
        players: {type: array, items: {$ref: '#/components/schemas/Player'}}
        status: {$ref: '#/components/schemas/SaveIndexStatus'}
        summary: {$ref: '#/components/schemas/ListSummary'}
        view: {$ref: '#/components/schemas/PlayerDataView'}
    PlayerDetailResult:
      type: object
      required: [player, status, view]
      properties:
        player: {$ref: '#/components/schemas/Player'}
        status: {$ref: '#/components/schemas/SaveIndexStatus'}
        view: {$ref: '#/components/schemas/PlayerDataView'}
    PlayerInventoryResult:
      type: object
      required: [containers, status, view]
      properties:
        containers: {type: array, items: {$ref: '#/components/schemas/SaveInventoryContainer'}}
        status: {$ref: '#/components/schemas/SaveIndexStatus'}
        view: {$ref: '#/components/schemas/PlayerDataView'}
    SaveIndexStatusEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/SaveIndexStatus'}
    PlayerListEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/PlayerListResult'}
    PlayerDetailEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/PlayerDetailResult'}
    PlayerInventoryEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok: {type: boolean, const: true}
        data: {$ref: '#/components/schemas/PlayerInventoryResult'}
    PalworldConfigUpdateRequest:
      type: object
      additionalProperties: false
      required: [settings]
      properties:
        settings: {type: object, additionalProperties: true}
        clear_secrets:
          type: array
          uniqueItems: true
          items: {type: string, enum: [AdminPassword, ServerPassword]}
    PalworldConfigApplyRequest:
      type: object
      additionalProperties: false
      required: [draft_id]
      properties:
        draft_id: {type: string, minLength: 1}
    PalworldConfigValidateRequest:
      type: object
      additionalProperties: false
      required: [settings]
      properties:
        settings: {type: object, additionalProperties: true}
        clear_secrets:
          type: array
          uniqueItems: true
          items: {type: string, enum: [AdminPassword, ServerPassword]}
    PalworldConfigDraft:
      type: object
      required: [id, revision_sha256, status, created_at, updated_at]
      properties:
        id: {type: string}
        revision_sha256: {type: string, pattern: '^[a-f0-9]{64}$'}
        status: {type: string, enum: [draft, applying, completed, failed, stale, expired, superseded]}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        applied_job_id: {type: string}
    PalworldSecretConfigured:
      type: object
      required: [configured]
      properties:
        configured: {type: boolean}
    PalworldSecretState:
      type: object
      required: [admin_password, server_password]
      properties:
        admin_password: {$ref: '#/components/schemas/PalworldSecretConfigured'}
        server_password: {$ref: '#/components/schemas/PalworldSecretConfigured'}
    PalworldFormatIssue:
      type: object
      required: [field, code, severity, message]
      properties:
        field: {type: string}
        code: {type: string}
        severity: {type: string, enum: [warning, error]}
        message: {type: string}
    PalworldValidationIssue:
      type: object
      required: [severity, message]
      properties:
        field: {type: string}
        severity: {type: string, enum: [warning, error]}
        message: {type: string}
    PalworldConfigFieldSchema:
      type: object
      required: [key, label, group, type, requires_restart, description]
      properties:
        key: {type: string}
        label: {type: string}
        group: {type: string}
        type: {type: string, enum: [string, bool, int, float, enum, list]}
        default: {anyOf: [{type: string}, {type: 'null'}]}
        enum: {type: array, items: {type: string}}
        enum_labels: {type: object, additionalProperties: {type: string}}
        min: {type: number}
        max: {type: number}
        requires_restart: {type: boolean}
        risk: {type: string}
        description: {type: string}
    PalworldConfigSchema:
      type: object
      required: [version, fields]
      properties:
        version: {type: string}
        fields: {type: array, items: {$ref: '#/components/schemas/PalworldConfigFieldSchema'}}
    PalworldConfigValidation:
      type: object
      required: [valid, issues]
      properties:
        valid: {type: boolean}
        issues: {type: array, items: {$ref: '#/components/schemas/PalworldValidationIssue'}}
    PalworldConfig:
      type: object
      required: [path, settings, revision_sha256, secret_state, format_issues, issues, pending_restart]
      properties:
        path: {type: string}
        settings: {type: object, additionalProperties: {type: string}}
